apiVersion: apps/v1
kind: Deployment

metadata:
  name: secure-cicd

spec:
  replicas: 2

  selector:
    matchLabels:
      app: secure-cicd

  template:
    metadata:
      labels:
        app: secure-cicd

    spec:
      securityContext:
        runAsNonRoot: true

      containers:

      - name: app

        image: USERNAME/secure-cicd:v1

        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"

        ports:
        - containerPort: 3000
