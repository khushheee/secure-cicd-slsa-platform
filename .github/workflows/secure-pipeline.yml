name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:

  security:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

          - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2

              - name: Build Image
        run: |
          docker build -t secure-cicd:${{ github.sha }} .
          
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'secure-cicd:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: OPA Policy Check
        uses: instrumenta/conftest-action@master
        with:
          files: k8s/deployment.yaml
          policy: policies/

    - uses: actions/setup-node@v4
      with:
        node-version: 18

    - run: |
        cd app
        npm install
        npm test
